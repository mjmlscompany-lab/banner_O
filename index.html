<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 일괄 변환기 - 텍스트 O 버전</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* 깔끔한 화이트 테마 및 블랙 텍스트 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #ffffff; color: #000000; overflow: hidden; }
        
        /* 드롭존을 화면 꽉 차게 배치하여 사용성 극대화 */
        #drop-zone { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: 4px dashed #eeeeee; margin: 40px; border-radius: 30px; cursor: pointer; 
            transition: all 0.3s;
        }
        #drop-zone:hover { border-color: #000000; background: #fafafa; }
        #drop-zone.hover { border-color: #2ecc71; background: #f4fff8; transform: scale(1.005); }

        .plus-icon { font-size: 50px; color: #dddddd; margin-bottom: 20px; }
        
        /* 요청하신 텍스트 수정 및 강조 */
        .main-text { font-size: 2.5em; font-weight: bold; color: #000000; letter-spacing: -1px; }
        .sub-text { margin-top: 15px; color: #888888; font-size: 1.1em; }

        #status { text-align: center; padding: 20px; font-weight: bold; color: #2ecc71; font-size: 1.2em; min-height: 1.2em; }
        
        /* 결과 미리보기 영역 (스크롤 가능하도록) */
        #result-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; padding: 0 40px 40px 40px; overflow-y: auto; max-height: 40vh; 
        }
        .preview-box { background: #ffffff; padding: 10px; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .preview-box img { width: 100%; border-radius: 6px; margin-bottom: 8px; }
        .preview-box small { font-weight: bold; font-size: 0.85em; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="drop-zone">
        <div class="plus-icon">+</div>
        <div class="main-text">텍스트 O 버전</div>
        <div class="sub-text">지정된 명칭으로 4종 규격 자동 변환 (PNG/JPG 최적화)</div>
    </div>
    
    <div id="status"></div>
    <div id="result-container"></div>
    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <canvas id="canvas"></canvas>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const resultContainer = document.getElementById('result-container');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 고정 명칭 및 규격
    const targetSpecs = [
        { w: 1000, h: 1000, name: '1000' },
        { w: 1200, h: 750,  name: '1200' },
        { w: 600,  h: 800,  name: 'y_thumbnail_banner' },
        { w: 1080, h: 720,  name: 'c_rolling_banner' }
    ];

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;

        status.innerText = "⚡ 규격 변환 및 용량 최적화 중...";
        resultContainer.innerHTML = '';
        const zip = new JSZip();

        for (const spec of targetSpecs) {
            canvas.width = spec.w;
            canvas.height = spec.h;
            
            const blob = await processImageFill(file, spec.w, spec.h);
            const fileName = `${spec.name}.jpg`;
            const url = URL.createObjectURL(blob);

            // 미리보기 생성
            const previewDiv = document.createElement('div');
            previewDiv.className = 'preview-box';
            previewDiv.innerHTML = `<img src="${url}"><br><small>${fileName}</small>`;
            resultContainer.appendChild(previewDiv);

            zip.file(fileName, blob);
        }

        const content = await zip.generateAsync({type: "blob"});
        const zipLink = document.createElement('a');
        zipLink.href = URL.createObjectURL(content);
        zipLink.download = `text_O_banners.zip`;
        zipLink.click();

        status.innerText = "✅ 추출 완료!";
        setTimeout(() => { status.innerText = ""; }, 3000);
    }

    function processImageFill(file, targetW, targetH) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, targetW, targetH);
                    let scale = Math.max(targetW / img.width, targetH / img.height);
                    let w = img.width * scale;
                    let h = img.height * scale;
                    let x = (targetW - w) / 2;
                    let y = (targetH - h) / 2;
                    ctx.drawImage(img, x, y, w, h);
                    canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.8);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
